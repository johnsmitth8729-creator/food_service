{% extends "base.html" %}

{% block content %}
<section class="py-12 min-h-[70vh] bg-mainbg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <div class="flex justify-between items-center mb-8">
            <div>
                <a href="{{ url_for('admin.dashboard') }}" class="text-sm font-bold text-graytext hover:text-orange mb-2 inline-block">&larr; Orqaga</a>
                <h1 class="text-3xl font-serif font-bold text-darktext">Mijozlar <span class="text-orange">Xabarlari</span></h1>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for c in contacts %}
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 relative">
                <i class="ph-fill ph-quotes text-3xl text-orange/20 absolute top-4 right-4"></i>
                <h3 class="font-bold text-darktext text-lg mb-1">{{ c.name }}</h3>
                <p class="text-orange font-bold text-sm mb-4"><i class="ph-fill ph-phone mr-1"></i>{{ c.phone }}</p>
                <p class="text-graytext italic bg-mainbg p-3 rounded-lg border border-gray-200">"{{ c.message }}"</p>
                <div class="mt-4 text-xs text-graytext font-medium text-right">
                    {{ c.created_at.strftime('%Y-%m-%d %H:%M') }}
                </div>
            </div>
            {% else %}
            <div class="col-span-full text-center py-12 bg-white rounded-xl shadow-sm border border-gray-100">
                <p class="text-graytext">Hozircha xabarlar yo'q.</p>
            </div>
            {% endfor %}
        </div>

    </div>
</section>
{% endblock %}
